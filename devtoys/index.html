<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToys | A Collection of Tools for Development</title>
    <!-- Add Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description"
        content="70+ free web development tools with no sign-up required. Instantly format JSON, convert Base64, transform color codes, generate QR codes and more in your browser.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-theme="light">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="#" class="logo">
                    <i data-lucide="wrench" class="logo-icon"></i>
                    <span>DevToys</span>
                </a>
                <button id="mobile-menu-close" class="mobile-only-btn" aria-label="Close menu">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="tool-search" placeholder="Search tools..." aria-label="Search tools">
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Tool categories will be injected here by app.js -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <button id="mobile-menu-open" class="mobile-only-btn menu-btn" aria-label="Open menu">
                    <i data-lucide="menu"></i>
                </button>
                <div class="header-breadcrumbs" id="breadcrumbs">
                    <!-- Breadcrumbs will be injected here -->
                    <span>Welcome</span>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark/Light Mode">
                        <i data-lucide="sun" class="light-icon"></i>
                        <i data-lucide="moon" class="dark-icon"></i>
                    </button>
                    <a href="https://github.com/zrohyun/zrohyun.github.io" target="_blank" rel="noopener noreferrer"
                        class="icon-btn" aria-label="GitHub Repository">
                        <i data-lucide="github"></i>
                    </a>
                </div>
            </header>

            <div class="tool-view-container" id="tool-view-container">
                <!-- Active tool content will be injected here -->
                <div class="welcome-screen">
                    <div class="welcome-hero">
                        <div class="hero-icon-wrapper">
                            <i data-lucide="zap" class="hero-icon"></i>
                        </div>
                        <h1>All the web tools you need,<br><span class="text-gradient">in one place</span></h1>
                        <p>70+ Ready-to-Use Tools • Anytime, Anywhere • Privacy First</p>
                    </div>

                    <div class="featured-tools-section">
                        <h2><span class="emoji">🔥</span> Featured Tools <span class="emoji">🔥</span></h2>
                        <div class="tools-grid" id="featured-tools-grid">
                            <!-- Featured tools generated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
